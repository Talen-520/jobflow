<!doctype html>
<html>
  <head>
    <title>Frontend Engineer - Acme AI</title>
  </head>
  <body>
    <main>
      <h1>Frontend Engineer</h1>
      <form>
        <label for="first_name">First name</label>
        <input id="first_name" name="first_name" required />

        <label for="last_name">Last name</label>
        <input id="last_name" name="last_name" required />

        <label for="email">Email</label>
        <input id="email" name="email" type="email" required />

        <label for="linkedin">LinkedIn profile</label>
        <input id="linkedin" name="linkedin" />

        <label for="resume">Resume</label>
        <input id="resume" name="resume" type="file" required />

        <label for="motivation">Why are you interested in this role?</label>
        <textarea id="motivation" name="motivation" required></textarea>

        <label for="sponsorship">Will you now or in the future require sponsorship?</label>
        <select id="sponsorship" name="sponsorship" required>
          <option value="">Select</option>
          <option>No</option>
          <option>Yes</option>
        </select>
      </form>
    </main>
  </body>
</html>
